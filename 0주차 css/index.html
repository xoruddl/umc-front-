<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      @keyframes move {
        from {
          transform: translateY(0) scaleX(1.2);
        }
        to {
          transform: translateY(-300px);
        }
      }
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .circle {
        width: 100px;
        height: 100px;
        background-color: purple;
        border-radius: 50%;
        animation: move 1s ease-out infinite alternate;
      }
    </style>
  </head>
  <body>
    <div class="container"><div class="circle"></div></div>
  </body>
</html>
